สร้างภาพเด็กผู้หญิงสไตล์ชิบิ น่ารักมาก ตัวเล็ก หัวโต ตาโตเป็นประกาย สีตาน้ำตาลเข้ม ใบหน้าคล้ายตุ๊กตา ผิวขาวเนียนเหมือนพอร์ซเลน แก้มชมพูอมแดง จมูกเล็ก ปากเล็กสีชมพูอ่อน อารมณ์ใสซื่อ น่าทะนุถนอม
 
มีหยดน้ำกระเซ็นบนใบหน้า ผมยาวสีน้ำตาลเข้มดัดลอนอ่อนๆ ปล่อยลงไหล่ มีการเก็บผมด้านข้างเล็กน้อย ประดับดอกไม้สีทองเล็กๆ ที่ผม ทรงผมดูฟุ้งนุ่ม ใส่ต่างหูทองแบบห้อยระย้า สวมสร้อยคอทองลายไทยเส้นใหญ่พร้อมจี้ลวดลายวิจิตร และสร้อยทองเส้นยาวซ้อนกันหลายชั้น ใส่กำไลทองที่ข้อมือ

สวมชุดไทยประยุกต์ ผ้าสไบเฉียงสีเขียวอมฟ้า (เขียวหยก) ลวดลายไทยหรูหรา มีขอบสีทองและด้านในซับด้วยผ้าสีชมพูอ่อน นุ่งผ้าซิ่นลายไทยโทนสีน้ำตาลเข้มลวดลายละเอียด
ถือขันเงินลวดลายแกะสลักแบบไทย ภายในมีน้ำ มือกำลังตักน้ำเล่น น้ำกระเซ็นออกจากขันอย่างสมจริง

ฉากหลังเป็นถนนในเมืองช่วงเทศกาลสงกรานต์ มีผู้คนจำนวนมากกำลังเล่นน้ำ ใส่เสื้อผ้าสีสันสดใส เช่น เสื้อฮาวาย มีปืนฉีดน้ำ บรรยากาศสนุกสนาน มีธงสามเหลี่ยมสีสดแขวนข้ามถนน อาคารสองข้างทางเป็นตึกแถวเก่าแบบไทย แสงธรรมชาติช่วงกลางวัน
โฟกัสที่ตัวแบบ (depth of field ตื้น) ฉากหลังเบลอแบบโบเก้ มีหยดน้ำลอยกลางอากาศแบบ freeze motion รายละเอียดคมชัดระดับสูง ผิวและผ้าแสดง texture ชัดเจน

<script>
/* 🔢 GET PROMPT NUMBER FROM FILE NAME */
const match = location.pathname.match(/prompt-person-(\d+)\.html/);
const promptNo = match ? match[1] : "000";

/* SET TITLE TEXT */
document.querySelector("#pageTitle .title-sub").textContent =
  `Prompt ${promptNo}`;
document.title = `หมวดบุคคล | Prompt ${promptNo}`;

/* 🧠 AI LIST */
const AI_LIST = [
  "gemini",
  "whisk",
  "meta",
  "copilot",
  "chatgpt",
  "leonardo",
  "raphaeal",
  "vheer",
  "kling",
  "bing",
  "dreamina",
  "flowai"
];

/* 📂 IMAGE PATH */
const IMAGE_PATH = "images/person/person_prompt";

/* 🖼 BUILD AI IMAGES (LOAD SAFE) */
const container = document.getElementById("aiImages");

AI_LIST.forEach(ai => {
  const img = new Image();
  img.src = `${IMAGE_PATH}/p${promptNo}-${ai}.jpg`;

  img.onload = () => {
    const box = document.createElement("div");
    box.className = "ai-box";

    img.alt = ai;

    const span = document.createElement("span");
    span.textContent = ai;

    box.appendChild(img);
    box.appendChild(span);
    container.appendChild(box);
  };
});

/* 📋 COPY */
function copyText(id){
  const text = document.getElementById(id);
  text.select();
  navigator.clipboard.writeText(text.value);
  alert("คัดลอกเรียบร้อยแล้ว ✨");
}

/* 🚪 LOGOUT */
function logout(){
  if(confirm("ต้องการออกจากระบบหรือไม่?")){
    localStorage.removeItem("loggedIn");
    window.location.href = "index.html";
  }
}
</script>
