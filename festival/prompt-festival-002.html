}

/* TITLE */

}

#pageTitle .title-main{

#pageTitle .title-sub{

}

.ai-images{

}

.ai-box{

}

.ai-box img{

.ai-box span{

.prompt-box h3{

textarea{

  padding:14px;
  border:none;

  color:#fff;
  font-size:16px;
  cursor:pointer;

<script>
/* 🔢 GET PROMPT NUMBER FROM FILE NAME */
const match = location.pathname.match(/prompt-festival-(\d+)\.html/);
const promptNo = match ? match[1] : "000";

/* SET TITLE TEXT */
document.querySelector("#pageTitle .title-sub").textContent =
  `Prompt ${promptNo}`;
document.title = `หมวดเทศกาลต่างๆ | Prompt ${promptNo}`;

/* 🧠 AI LIST */
const AI_LIST = [
  "gemini",
  "whisk",
  "meta",
  "copilot",
  "chatgpt",
  "leonardo",
  "raphaeal",
  "vheer",
  "kling",
  "bing",
  "dreamina",
  "manus",
  "flow ai"
];

/* 📂 IMAGE PATH */
const IMAGE_PATH = "../images/festival";

/* 🖼 BUILD AI IMAGES (LOAD SAFE) */
const container = document.getElementById("aiImages");

AI_LIST.forEach(ai => {
  const img = new Image();
  img.src = `${IMAGE_PATH}/f${promptNo}-${ai}.jpg`;

  img.onload = () => {
    const box = document.createElement("div");
    box.className = "ai-box";

    img.alt = ai;

    const span = document.createElement("span");
    span.textContent = ai;

    box.appendChild(img);
    box.appendChild(span);
    container.appendChild(box);
  };
});

/* 📋 COPY */
function copyText(id){
  const text = document.getElementById(id);
  text.select();
  navigator.clipboard.writeText(text.value);
  alert("คัดลอกเรียบร้อยแล้ว ✨");
}

/* 🚪 LOGOUT */
function logout(){
  if(confirm("ต้องการออกจากระบบหรือไม่?")){
    localStorage.removeItem("loggedIn");
    window.location.href = "index.html";
  }
}
</script>
