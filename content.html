<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONTENTS | Prompt eBook</title>

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background:#fff6f8;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

/* TOP BAR */
.top-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.top-bar a{
  text-decoration:none;
  color:#ff6f91;
  font-weight:600;
}

/* TITLE */
h1{
  text-align:center;
  margin:20px 0 30px;
  letter-spacing:2px;
}

/* CARD */
.content-list{
  display:flex;
  flex-direction:column;
  gap:18px;
}

.content-item{
  display:flex;
  gap:16px;
  align-items:center;
  background:#fff;
  border-radius:20px;
  overflow:hidden;
  text-decoration:none;
  color:#333;
  box-shadow:0 4px 14px rgba(0,0,0,0.08);
  transition:0.25s;
}

.content-item:hover{
  transform:translateY(-4px);
  box-shadow:0 8px 20px rgba(0,0,0,0.12);
}

/* IMAGE */
.content-item img{
  width:140px;
  height:100%;
  object-fit:cover;
}

/* TEXT */
.content-text{
  flex:1;
  padding:16px 10px;
}

.content-title{
  font-weight:600;
  margin-bottom:4px;
}

.arrow{
  padding-right:16px;
  font-size:20px;
  color:#ff6f91;
}

/* MOBILE */
@media (max-width:768px){
  .content-item{
    flex-direction:column;
    align-items:flex-start;
  }

  .content-item img{
    width:100%;
    height:160px;
  }

  .arrow{
    align-self:flex-end;
    padding-bottom:10px;
  }
}

/* FOOTER */
footer{
  text-align:center;
  font-size:13px;
  color:#999;
  margin:40px 0 10px;
}
</style>
</head>

<body>
<div class="container">

  <!-- TOP BAR -->
  <div class="top-bar">
    <a href="index.html">← กลับหน้าหลัก</a>
    <a href="#" onclick="logout()">🚪 Logout</a>
  </div>

  <h1>CONTENTS</h1>

  <div class="content-list">

    <!-- HOW TO USE -->
    <a href="how-to-use.html" class="content-item">
      <img src="images/content/howto.jpg">
      <div class="content-text">
        <div class="content-title">แนะนำวิธีใช้งาน AI สร้างภาพ</div>
      </div>
      <div class="arrow">›</div>
    </a>

    <!-- CATEGORY 1 -->
    <a href="gallery-person-1.html" class="content-item">
      <img src="images/content/category1.jpg">
      <div class="content-text">
        <div class="content-title">หมวดหมู่ที่ 1 การ์ตูนน่ารัก</div>
      </div>
      <div class="arrow">›</div>
    </a>

    <!-- CATEGORY 2 -->
    <a href="gallery-fashion.html" class="content-item">
      <img src="images/content/category2.jpg">
      <div class="content-text">
        <div class="content-title">หมวดหมู่ที่ 2 ตู้เสื้อผ้าชุดสวยพิเศษ</div>
      </div>
      <div class="arrow">›</div>
    </a>

      <!-- CATEGORY 3 -->
    <a href="gallery-fashion.html" class="content-item">
      <img src="images/content/category2.jpg">
      <div class="content-text">
        <div class="content-title">หมวดหมู่ที่ 3 เทศกาลต่างๆ </div>
      </div>
      <div class="arrow">›</div>
    </a>

  </div>

  <footer>
    © 2025 AI Persona Studio | Created by Kru Sandra | All rights reserved.
  </footer>

</div>

<script>
/* 🔒 Login Guard */
if(localStorage.getItem("loggedIn") !== "true"){
  window.location.href = "index.html";
}

/* 🚪 Logout */
function logout(){
  if(confirm("ต้องการออกจากระบบหรือไม่?")){
    localStorage.removeItem("loggedIn");
    window.location.href = "index.html";
  }
}
</script>

</body>
</html>
