<style>

.container{

/* TOP BAR */

}

.top-bar a{

  color:#ff6f91;
  font-weight:600;
  font-size:15px;
}

.top-actions{
  display:flex;
  gap:14px;

}

/* TITLE */
#pageTitle{
  text-align:center;
  margin:10px 0 30px;
  line-height:1.3;
}

#pageTitle .title-main{
  display:block;
  font-size:24px;     /* หมวดบุคคล (ใหญ่กว่า) */

#pageTitle .title-sub{

}

.ai-images{
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:12px;
}

.ai-box{
  text-align:center;
}

.ai-box img{

.ai-box span{

  font-weight:600;
  text-transform:capitalize;
}

/* PROMPT BOX */
.prompt-box{
  background:#fff;
  border-radius:20px;
  padding:20px;
  margin-top:30px;
  box-shadow:0 4px 14px rgba(0,0,0,0.08);
}

.prompt-box h3{
  margin-top:0;
}

textarea{
  width:100%;
  border-radius:14px;
  padding:14px;
  border:1px solid #ddd;
  font-size:15px;
  resize:none;
  box-sizing:border-box;
}

/* COPY BUTTON */
.copy-btn{
  width:100%;
  margin-top:12px;
  padding:14px;
  border:none;
  border-radius:30px;
  background:#ff6f91;
  color:#fff;
  font-size:16px;
  cursor:pointer;
}

/* FOOTER */
footer{
  text-align:center;
  font-size:13px;
  color:#999;
  margin:40px 0 10px;
}
</style>
</head>

  <!-- ENGLISH PROMPT -->

  <footer>

</div>

<script>
/* 🔢 GET PROMPT NUMBER FROM FILE NAME */
const match = location.pathname.match(/prompt-person-(\d+)\.html/);
const promptNo = match ? match[1] : "000";

/* SET TITLE TEXT */
document.querySelector("#pageTitle .title-sub").textContent =
  `Prompt ${promptNo}`;
document.title = `หมวดบุคคล | Prompt ${promptNo}`;

/* 🧠 AI LIST */
const AI_LIST = [
  "gemini",
  "whisk",
  "meta",
  "copilot",
  "chatgpt",
  "leonardo",
  "raphaeal",
  "vheer",
  "kling",
  "bing",
  "dreamina"
];

/* 📂 IMAGE PATH */
const IMAGE_PATH = "images/person/person_prompt";

/* 🖼 BUILD AI IMAGES (LOAD SAFE) */
const container = document.getElementById("aiImages");

AI_LIST.forEach(ai => {
  const img = new Image();
  img.src = `${IMAGE_PATH}/p${promptNo}-${ai}.jpg`;

  img.onload = () => {
    const box = document.createElement("div");
    box.className = "ai-box";

    img.alt = ai;

    const span = document.createElement("span");
    span.textContent = ai;

    box.appendChild(img);
    box.appendChild(span);
    container.appendChild(box);
  };
});

/* 📋 COPY */
function copyText(id){
  const text = document.getElementById(id);
  text.select();
  navigator.clipboard.writeText(text.value);
  alert("คัดลอกเรียบร้อยแล้ว ✨");
}

/* 🚪 LOGOUT */
function logout(){
  if(confirm("ต้องการออกจากระบบหรือไม่?")){
    localStorage.removeItem("loggedIn");
    window.location.href = "index.html";
  }
}
</script>
